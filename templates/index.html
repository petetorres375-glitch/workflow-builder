<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workflow Builder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0e17;
      color: #e6edf3;
      min-height: 100vh;
      padding: 2.5rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #d29922, #f78166, #d29922);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 4s linear infinite;
    }

    @keyframes shimmer {
      to { background-position: 200% center; }
    }

    header p {
      color: #6e7681;
      margin-top: 0.5rem;
      font-size: 0.95rem;
      letter-spacing: 1px;
    }

    .search-box {
      max-width: 720px;
      margin: 0 auto 2.5rem;
      display: flex;
      gap: 0.6rem;
    }

    .search-box input {
      flex: 1;
      padding: 0.85rem 1.2rem;
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      color: #e6edf3;
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-box input:focus {
      border-color: #d29922;
      box-shadow: 0 0 0 3px rgba(210, 153, 34, 0.12);
    }

    .search-box input::placeholder { color: #484f58; }

    .search-box button {
      padding: 0.85rem 1.6rem;
      background: linear-gradient(135deg, #9e6a03, #d29922);
      border: none;
      border-radius: 8px;
      color: #0a0e17;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: opacity 0.2s, transform 0.1s;
    }

    .search-box button:hover { opacity: 0.9; }
    .search-box button:active { transform: scale(0.98); }
    .search-box button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .spinner {
      display: none;
      max-width: 720px;
      margin: 0 auto 1.5rem;
      align-items: center;
      gap: 0.75rem;
      color: #8b949e;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }

    .spinner.active { display: flex; }

    .spinner-ring {
      width: 20px;
      height: 20px;
      border: 2px solid #21262d;
      border-top-color: #d29922;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .results {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .filename {
      font-family: 'Courier New', monospace;
      color: #d29922;
      font-size: 0.95rem;
      font-weight: bold;
    }

    .download-btn {
      padding: 0.4rem 1rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #8b949e;
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }

    .download-btn:hover {
      border-color: #d29922;
      color: #d29922;
    }

    .code-panel {
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #21262d;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }

    .code-header {
      padding: 0.55rem 1.1rem;
      background: #1a1500;
      color: #d29922;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .code-header::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #d29922;
    }

    .code-body {
      padding: 1.1rem 1.2rem;
      background: #0d1117;
      border-left: 3px solid #4a3510;
      font-family: 'Courier New', monospace;
      font-size: 0.88rem;
      line-height: 1.6;
      white-space: pre;
      overflow-x: auto;
      color: #c9d1d9;
    }

    .error {
      max-width: 720px;
      margin: 0 auto;
      padding: 1rem 1.2rem;
      background: #1a0d0d;
      border: 1px solid #f85149;
      border-radius: 8px;
      color: #f85149;
      font-size: 0.95rem;
    }

    .query-label {
      max-width: 720px;
      margin: 0 auto 0.75rem;
      color: #484f58;
      font-size: 0.82rem;
      letter-spacing: 1px;
    }

    .query-label span {
      color: #8b949e;
      font-style: italic;
    }
  </style>
</head>
<body>

  <header>
    <h1>Workflow Builder</h1>
    <p>Describe a repetitive task — get a ready-to-run Python script.</p>
  </header>

  <form method="POST" id="build-form">
    <div class="search-box">
      <input
        type="text"
        name="task"
        placeholder="e.g. Rename all JPEGs in a folder to include today's date"
        value="{{ task }}"
        autofocus
      >
      <button type="submit" id="build-btn">Build</button>
    </div>
  </form>

  <div class="spinner" id="spinner">
    <div class="spinner-ring"></div>
    <span>Generating script...</span>
  </div>

  <script>
    document.getElementById('build-form').addEventListener('submit', function () {
      const btn = document.getElementById('build-btn');
      const spinner = document.getElementById('spinner');
      btn.disabled = true;
      btn.textContent = 'Building...';
      spinner.classList.add('active');
    });
  </script>

  {% if error %}
    <div class="error">{{ error }}</div>
  {% endif %}

  {% if result %}
    <div class="query-label">Generated for: <span>{{ task }}</span></div>
    <div class="results">

      <div class="result-meta">
        <span class="filename">{{ result.filename }}</span>
        <a class="download-btn" href="/download/{{ result.filename }}">Download</a>
      </div>

      <div class="code-panel">
        <div class="code-header">Script</div>
        <div class="code-body">{{ result.script }}</div>
      </div>

    </div>
  {% endif %}

</body>
</html>
